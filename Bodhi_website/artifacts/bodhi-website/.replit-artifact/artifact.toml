kind = "web"
previewPath = "/"
title = "BODHI - Your Money Alive"
version = "1.0.0"
id = "artifacts/bodhi-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25236

[services.development]
run = "pnpm --filter @workspace/bodhi-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bodhi-website", "run", "build" ]
publicDir = "artifacts/bodhi-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25236"
BASE_PATH = "/"
