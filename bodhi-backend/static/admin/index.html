<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODHI Admin | Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">BODHI <span>STAFF</span></div>
      <ul class="nav-links">
        <li><a href="index" class="active">Dashboard</a></li>
        <li><a href="users">User Directory</a></li>
        <li><a href="create">Mint New Admin</a></li>
      </ul>
      <button onclick="logout()" class="btn btn-outline logout-btn">Log Out</button>
    </aside>

    <main class="main-content">
      <h1 style="margin-bottom: 10px;">Welcome Back!</h1>
      <p style="color: var(--text-dim); margin-bottom: 40px;">Here is what's happening in the system today.</p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Users</div>
          <div class="stat-value" id="count-users">...</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Users</div>
          <div class="stat-value" id="count-active">...</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">System Admin Pool</div>
          <div class="stat-value" id="count-admins">...</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Balance Pool</div>
          <div class="stat-value" id="pool-balance">...</div>
        </div>
      </div>

      <div class="stat-card" style="margin-top: 40px;">
        <h3 style="margin-bottom: 20px;">System Health</h3>
        <p>All subsystems are operational. 🚀</p>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) window.location.href = 'login';

    async function loadStats() {
      try {
        const res = await fetch('/admin/dashboard', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) logout();
        const data = await res.json();
        
        document.getElementById('count-users').textContent = data.total_users;
        document.getElementById('count-active').textContent = data.active_users;
        document.getElementById('count-admins').textContent = data.total_admins;
        document.getElementById('pool-balance').textContent = `₹${data.total_balance_pool.toLocaleString()}`;
      } catch (err) {
        console.error('Failed to load stats');
      }
    }

    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = 'login';
    }

    loadStats();
  </script>
</body>
</html>
