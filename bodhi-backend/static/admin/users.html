<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODHI | User Intelligence</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">BODHI <span>COMMAND</span></div>
      
      <ul class="nav-links">
        <li><a href="index">Overview</a></li>
        <li><a href="users" class="active">User Intelligence</a></li>
      </ul>

      <div class="sidebar-footer">
        <a href="create" class="btn btn-outline" style="width: 100%; border-color: var(--accent); color: var(--accent-light);">Create New Admin</a>
        <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Log Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
          <h1>User Intelligence</h1>
          <p>Complete registry of all registered entities and access levels.</p>
        </div>
        <div style="display: flex; gap: 12px;">
          <input type="text" id="searchInput" placeholder="Scan by email..." style="width: 320px;">
          <button onclick="searchUsers()" class="btn btn-primary">Scan Registry</button>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Entity Details</th>
              <th>Access Level</th>
              <th>Operational Status</th>
              <th style="text-align: right;">Authorization Controls</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- Row Injection -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) window.location.href = 'login';

    async function fetchUsers(query = '') {
      const url = query ? `/admin/users/search?q=${query}` : '/admin/users';
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) logout();
      const users = await res.json();
      renderTable(users);
    }

    function renderTable(users) {
      const body = document.getElementById('userTableBody');
      body.innerHTML = users.map(u => `
        <tr>
          <td>
            <div style="font-weight: 700; font-size: 16px;">${u.email}</div>
            <div style="font-size: 11px; color: var(--text-dim); font-family: monospace;">UUID: ${u.id}</div>
          </td>
          <td>
            <span style="font-weight: 700; color: ${u.role === 'admin' ? 'var(--accent-light)' : 'var(--text-dim)'}">
                ${u.role.toUpperCase()}
            </span>
          </td>
          <td>
            <span class="status-pill ${u.is_active ? 'active' : 'inactive'}">
              ${u.is_active ? 'ACTIVE' : 'OFFLINE'}
            </span>
          </td>
          <td style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn btn-outline" style="font-size: 12px;" onclick="toggleActive('${u.id}')">
                ${u.is_active ? 'Suspend' : 'Resume'}
            </button>
            ${u.role === 'user' ? 
              `<button class="btn btn-outline" style="color: var(--accent-light); font-size: 12px; border-color: rgba(139, 92, 246, 0.3);" onclick="promote('${u.id}')">Promote</button>` : 
              `<button class="btn btn-danger" style="font-size: 12px;" onclick="demote('${u.id}')">Demote</button>`
            }
            <button class="btn btn-danger" onclick="deleteUser('${u.id}')">&#10005;</button>
          </td>
        </tr>
      `).join('');
    }

    async function toggleActive(id) {
      await fetch(`/admin/toggle-active/${id}`, { 
        method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } 
      });
      fetchUsers();
    }

    async function promote(id) {
      const password = prompt('SECURITY AUTHORIZATION REQUIRED:\n\nEnter your administrator password to promote this user:');
      if (!password) return;

      const res = await fetch(`/admin/make-admin/${id}`, { 
        method: 'PUT', 
        headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ admin_password: password })
      });
      
      const data = await res.json();
      if (res.ok) {
          alert('PROMOTION SUCCESSFUL: Formal notification dispatched to user.');
          fetchUsers();
      } else {
          alert('AUTHORIZATION FAILED: ' + (data.detail || 'Access denied.'));
      }
    }

    async function demote(id) {
      const password = prompt('SECURITY AUTHORIZATION REQUIRED:\n\nEnter your administrator password to demote this administrator:');
      if (!password) return;

      const res = await fetch(`/admin/remove-admin/${id}`, { 
        method: 'PUT', 
        headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ admin_password: password })
      });
      
      const data = await res.json();
      if (res.ok) {
          alert('DEMOTION SUCCESSFUL: Formal notification dispatched to user.');
          fetchUsers();
      } else {
          alert('AUTHORIZATION FAILED: ' + (data.detail || 'Access denied.'));
      }
    }

    async function deleteUser(id) {
      if (!confirm('EXTREME WARNING: This action will permanently erase this entity from the system. Proceed?')) return;
      await fetch(`/admin/user/${id}`, { 
        method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } 
      });
      fetchUsers();
    }

    function searchUsers() {
      const q = document.getElementById('searchInput').value;
      fetchUsers(q);
    }

    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = 'login';
    }

    fetchUsers();
  </script>
</body>
</html>
