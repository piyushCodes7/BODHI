<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODHI Admin | Users</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">BODHI <span>STAFF</span></div>
      <ul class="nav-links">
        <li><a href="index">Dashboard</a></li>
        <li><a href="users" class="active">User Directory</a></li>
        <li><a href="create">Mint New Admin</a></li>
      </ul>
      <button onclick="logout()" class="btn btn-outline logout-btn">Log Out</button>
    </aside>

    <main class="main-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>User Directory</h1>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="searchInput" placeholder="Search by email..." style="width: 300px; padding: 10px 16px;">
          <button onclick="searchUsers()" class="btn btn-primary">Search</button>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>User Details</th>
              <th>Role</th>
              <th>Status</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- Row Injection -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) window.location.href = 'login';

    async function fetchUsers(query = '') {
      const url = query ? `/admin/users/search?q=${query}` : '/admin/users';
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) logout();
      const users = await res.json();
      renderTable(users);
    }

    function renderTable(users) {
      const body = document.getElementById('userTableBody');
      body.innerHTML = users.map(u => `
        <tr>
          <td>
            <div style="font-weight: 700;">${u.email}</div>
            <div style="font-size: 12px; color: var(--text-dim);">${u.id}</div>
          </td>
          <td>
            <span style="color: ${u.role === 'admin' ? 'var(--accent)' : 'inherit'}">${u.role.toUpperCase()}</span>
          </td>
          <td>
            <span class="status-pill ${u.is_active ? 'active' : 'inactive'}">
              ${u.is_active ? 'ACTIVE' : 'SUSPENDED'}
            </span>
          </td>
          <td style="display: flex; gap: 8px; justify-content: flex-end;">
            <button class="btn btn-outline" onclick="toggleActive('${u.id}')">${u.is_active ? 'Suspend' : 'Activate'}</button>
            ${u.role === 'user' ? 
              `<button class="btn btn-outline" style="color: var(--success);" onclick="promote('${u.id}')">Promote</button>` : 
              `<button class="btn btn-outline" style="color: var(--danger);" onclick="demote('${u.id}')">Demote</button>`
            }
            <button class="btn btn-danger" onclick="deleteUser('${u.id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    async function toggleActive(id) {
      await fetch(`/admin/toggle-active/${id}`, { 
        method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } 
      });
      fetchUsers();
    }

    async function promote(id) {
      if (!confirm('Promote this user to Administrator?')) return;
      await fetch(`/admin/make-admin/${id}`, { 
        method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } 
      });
      fetchUsers();
    }

    async function demote(id) {
      if (!confirm('Strip this user of Administrator privileges?')) return;
      await fetch(`/admin/remove-admin/${id}`, { 
        method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } 
      });
      fetchUsers();
    }

    async function deleteUser(id) {
      if (!confirm('Permanently DELETE this user and all associated data?')) return;
      await fetch(`/admin/user/${id}`, { 
        method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } 
      });
      fetchUsers();
    }

    function searchUsers() {
      const q = document.getElementById('searchInput').value;
      fetchUsers(q);
    }

    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = 'login';
    }

    fetchUsers();
  </script>
</body>
</html>
