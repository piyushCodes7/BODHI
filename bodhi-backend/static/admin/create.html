<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODHI Admin | Mint Admin</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">BODHI <span>STAFF</span></div>
      <ul class="nav-links">
        <li><a href="index">Dashboard</a></li>
        <li><a href="users">User Directory</a></li>
        <li><a href="create" class="active">Mint New Admin</a></li>
      </ul>
      <button onclick="logout()" class="btn btn-outline logout-btn">Log Out</button>
    </aside>

    <main class="main-content">
      <h1 style="margin-bottom: 10px;">Mint New Administrator</h1>
      <p style="color: var(--text-dim); margin-bottom: 40px;">Create a new administrative account directly from the panel.</p>

      <div class="stat-card" style="max-width: 500px;">
        <form id="createAdminForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="admin@bodhi.com">
          </div>
          <div class="form-group">
            <label>Initial Password</label>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
          <div id="statusMsg" style="margin-bottom: 20px; display: none; font-size: 14px; font-weight: 700;"></div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Create Administrator</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) window.location.href = 'login';

    document.getElementById('createAdminForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const statusMsg = document.getElementById('statusMsg');
      statusMsg.style.display = 'none';

      const payload = {
        full_name: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch('/admin/create-admin', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          statusMsg.textContent = '✅ Administrator successfully minted.';
          statusMsg.style.color = 'var(--success)';
          statusMsg.style.display = 'block';
          document.getElementById('createAdminForm').reset();
        } else {
          const err = await response.json();
          statusMsg.textContent = '❌ ' + (err.detail || 'Failed to create.');
          statusMsg.style.color = 'var(--danger)';
          statusMsg.style.display = 'block';
        }
      } catch (err) {
        statusMsg.textContent = '❌ Connection error.';
        statusMsg.style.color = 'var(--danger)';
        statusMsg.style.display = 'block';
      }
    });

    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = 'login';
    }
  </script>
</body>
</html>
