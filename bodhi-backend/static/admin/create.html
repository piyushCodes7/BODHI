<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODHI | Elevate Account</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">BODHI <span>COMMAND</span></div>
      
      <ul class="nav-links">
        <li><a href="index">Overview</a></li>
        <li><a href="users">User Intelligence</a></li>
      </ul>

      <div class="sidebar-footer">
        <a href="create" class="btn btn-outline active" style="width: 100%; border-color: var(--accent); color: var(--accent-light);">Create New Admin</a>
        <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Log Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Authorize New Administrator</h1>
        <p>Grant top-level system access to a new entity. Use extreme caution.</p>
      </div>

      <div class="stat-card form-card">
        <form id="createForm">
          <div class="form-group">
            <label>Legal Full Name</label>
            <input type="text" id="full_name" placeholder="Enter identity name..." required>
          </div>
          <div class="form-group">
            <label>Security Email</label>
            <input type="email" id="email" placeholder="identity@bodhi.com" required>
          </div>
          <div class="form-group">
            <label>Initial Access Key</label>
            <input type="password" id="password" placeholder="••••••••••••" required>
          </div>
          <div id="error" style="color: var(--danger); margin-bottom: 20px; font-size: 14px; display: none;"></div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Authorize Admin Account</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) window.location.href = 'login';

    document.getElementById('createForm').onsubmit = async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      err.style.display = 'none';

      const payload = {
        full_name: document.getElementById('full_name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('/admin/create-admin', {
          method: 'POST',
          headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json' 
          },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          alert('AUTHORIZATION COMPLETE: New administrator added to the pool.');
          window.location.href = 'users';
        } else {
          const data = await res.json();
          err.textContent = data.detail || 'Initialization failed.';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'System connection error.';
        err.style.display = 'block';
      }
    };

    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = 'login';
    }
  </script>
</body>
</html>
