<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODHI Admin Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">BODHI <span>ADMIN</span></div>
      <p style="color: var(--text-dim); margin-bottom: 30px;">Please login to continue</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="admin@bodhi.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; height: 50px;">Sign In</button>
      </form>
      
      <div id="errorMsg" style="color: var(--danger); font-size: 14px; margin-top: 20px; display: none; text-align: center;"></div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      const formData = new FormData();
      formData.append('username', document.getElementById('email').value);
      formData.append('password', document.getElementById('password').value);

      try {
        const response = await fetch('/admin/login', {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('admin_token', data.access_token);
          window.location.href = 'index.html'; // Load dashboard
        } else {
          const err = await response.json();
          errorMsg.textContent = err.detail || 'Login failed. Check credentials.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Is the server running?';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
