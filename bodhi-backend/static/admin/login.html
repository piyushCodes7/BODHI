<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODHI Admin Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card" id="loginCard">
      <div class="logo">BODHI <span>ADMIN</span></div>
      <p style="color: var(--text-dim); margin-bottom: 30px;">Please login to continue</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="admin@bodhi.com">
        </div>
        <div class="form-group" style="position: relative;">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
          <a href="#" id="forgotPasswordLink" style="position: absolute; right: 0; top: 0; font-size: 12px; color: var(--primary); text-decoration: none;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; height: 50px;">Sign In</button>
      </form>
      
      <div id="errorMsg" style="color: var(--danger); font-size: 14px; margin-top: 20px; display: none; text-align: center;"></div>
    </div>

    <div class="login-card" id="resetCard" style="display: none;">
      <div class="logo">Reset <span>PASSWORD</span></div>
      <p style="color: var(--text-dim); margin-bottom: 30px;">Enter your admin email to receive an OTP.</p>
      
      <form id="requestResetForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="resetEmail" required placeholder="admin@bodhi.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; height: 50px;" id="sendOtpBtn">Send OTP</button>
      </form>

      <form id="confirmResetForm" style="display: none; margin-top: 20px;">
        <div class="form-group">
          <label>OTP Code</label>
          <input type="text" id="resetOtp" required placeholder="123456">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; height: 50px;">Update Password</button>
      </form>
      
      <div style="text-align: center; margin-top: 20px;">
        <a href="#" id="backToLoginLink" style="font-size: 14px; color: var(--text-dim); text-decoration: none;">&larr; Back to Login</a>
      </div>
      <div id="resetErrorMsg" style="color: var(--danger); font-size: 14px; margin-top: 20px; display: none; text-align: center;"></div>
      <div id="resetSuccessMsg" style="color: #10b981; font-size: 14px; margin-top: 20px; display: none; text-align: center;"></div>
    </div>
  </div>

  <script>
    // Elements
    const loginCard = document.getElementById('loginCard');
    const resetCard = document.getElementById('resetCard');
    const errorMsg = document.getElementById('errorMsg');
    const resetErrorMsg = document.getElementById('resetErrorMsg');
    const resetSuccessMsg = document.getElementById('resetSuccessMsg');
    
    // Toggles
    document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
      e.preventDefault();
      loginCard.style.display = 'none';
      resetCard.style.display = 'block';
    });
    
    document.getElementById('backToLoginLink').addEventListener('click', (e) => {
      e.preventDefault();
      resetCard.style.display = 'none';
      loginCard.style.display = 'block';
      document.getElementById('requestResetForm').style.display = 'block';
      document.getElementById('confirmResetForm').style.display = 'none';
      resetErrorMsg.style.display = 'none';
      resetSuccessMsg.style.display = 'none';
    });

    // Login Form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const formData = new FormData();
      formData.append('username', document.getElementById('email').value);
      formData.append('password', document.getElementById('password').value);

      try {
        const response = await fetch('/admin/login', {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('admin_token', data.access_token);
          window.location.href = 'index.html'; // Load dashboard
        } else {
          const err = await response.json();
          errorMsg.textContent = err.detail || 'Login failed. Check credentials.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Is the server running?';
        errorMsg.style.display = 'block';
      }
    });

    // Request Reset OTP
    document.getElementById('requestResetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      resetErrorMsg.style.display = 'none';
      resetSuccessMsg.style.display = 'none';
      
      const email = document.getElementById('resetEmail').value;
      const sendOtpBtn = document.getElementById('sendOtpBtn');
      
      sendOtpBtn.textContent = 'Sending...';
      sendOtpBtn.disabled = true;

      try {
        const response = await fetch('/admin/forgot-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email })
        });

        if (response.ok) {
          document.getElementById('requestResetForm').style.display = 'none';
          document.getElementById('confirmResetForm').style.display = 'block';
          resetSuccessMsg.textContent = 'OTP has been sent to your email.';
          resetSuccessMsg.style.display = 'block';
        } else {
          const err = await response.json();
          let msg = 'Failed to process request.';
          if (err.detail) {
            msg = typeof err.detail === 'string' ? err.detail : (err.detail[0]?.msg || JSON.stringify(err.detail));
          }
          resetErrorMsg.textContent = msg;
          resetErrorMsg.style.display = 'block';
        }
      } catch (err) {
        resetErrorMsg.textContent = 'Connection error.';
        resetErrorMsg.style.display = 'block';
      } finally {
        sendOtpBtn.textContent = 'Send OTP';
        sendOtpBtn.disabled = false;
      }
    });

    // Confirm Reset
    document.getElementById('confirmResetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      resetErrorMsg.style.display = 'none';
      resetSuccessMsg.style.display = 'none';

      const email = document.getElementById('resetEmail').value;
      const otp = document.getElementById('resetOtp').value;
      const newPassword = document.getElementById('newPassword').value;

      try {
        const response = await fetch('/admin/reset-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email, otp, new_password: newPassword })
        });

        if (response.ok) {
          resetSuccessMsg.textContent = 'Password updated successfully! You can now login.';
          resetSuccessMsg.style.display = 'block';
          document.getElementById('confirmResetForm').reset();
          document.getElementById('confirmResetForm').style.display = 'none';
        } else {
          const err = await response.json();
          let msg = 'Failed to reset password.';
          if (err.detail) {
            msg = typeof err.detail === 'string' ? err.detail : (err.detail[0]?.msg || JSON.stringify(err.detail));
          }
          resetErrorMsg.textContent = msg;
          resetErrorMsg.style.display = 'block';
        }
      } catch (err) {
        resetErrorMsg.textContent = 'Connection error.';
        resetErrorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
